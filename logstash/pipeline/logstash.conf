input {
  # Read from file (log file written by Spring Boot app)
  file {
    path => "/logs/ecommerce-backend.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }

  # Optional: TCP input for direct log streaming (if you configure logback to send over TCP)
  # tcp {
  #   port => 5000
  #   codec => json
  # }
}

filter {
  # Parse timestamp field
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  # Add tags based on log level for easier filtering in Kibana
  if [level] == "ERROR" {
    mutate {
      add_tag => [ "error" ]
    }
  }
  
  if [level] == "WARN" {
    mutate {
      add_tag => [ "warning" ]
    }
  }

  # Extract additional context fields
  mutate {
    rename => {
      "logger_name" => "logger"
    }
  }
}

output {
  # Send to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "ecommerce-logs-%{+YYYY.MM.dd}"
  }

  # Debug output to console (optional, disable in production)
  stdout {
    codec => rubydebug
  }
}
